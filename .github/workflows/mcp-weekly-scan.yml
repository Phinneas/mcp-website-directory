name: MCP Weekly Server Scan
on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8:00am UTC
  workflow_dispatch:  # Manual trigger option

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          cd scripts/tavily && pnpm install --frozen-lockfile
      - name: Compile TypeScript
        run: cd scripts/tavily && npx tsc
      - name: Run Weekly Server Scan
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          node scripts/tavily/weekly-scan.js
          # Upsert results to D1 (assuming weekly-scan outputs to data/servers.json)
          node scripts/upsert-to-d1.js data/servers.json servers
      - name: Scan Skills
        run: |
          npx tsx scripts/scan-skills.ts
          git diff --quiet src/data/skill-scans.json || (
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/skill-scans.json
            git commit -m "chore: weekly skill scan [$(date -u +%Y-%m-%d)]"
            git push
          )
