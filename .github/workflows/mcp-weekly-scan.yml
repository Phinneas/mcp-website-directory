name: MCP Weekly Server Scan
on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8:00am UTC
  workflow_dispatch:  # Manual trigger option

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          npm ci
          cd scripts/tavily && npm ci
      - name: Compile TypeScript
        run: cd scripts/tavily && npx tsc
      - name: Run Weekly Scan
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          if [ -z "$TAVILY_API_KEY" ]; then
            echo "Error: TAVILY_API_KEY is not set. Skipping scan."
            exit 1
          fi
          node scripts/tavily/weekly-scan.js
      - name: Commit Results
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Unignore data files if they are ignored by global rules
          git add data/seen-servers.json
          git add data/new-servers/*.json || true
          git add data/monthly-reports/*.md || true
          git diff --staged --quiet || git commit -m "Weekly MCP scan results $(date +'%Y-%m-%d')"
          git push