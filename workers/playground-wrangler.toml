name = "mcp-playground"
main = "playground.js"
compatibility_date = "2024-11-12"

[[d1_databases]]
binding = "DB"
database_name = "mcp-directory"
database_id = "527bf637-7aba-4719-8d39-b9e6e614a3b9"

[[durable_objects]]
bindings = [
  { name = "PLAYGROUND_SESSIONS", class_name = "PlaygroundSession" }
]

[[migrations]]
tag = "v1"
new_classes = ["PlaygroundSession"]
